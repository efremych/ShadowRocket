name: Build domains rules

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ─── 1. exclude_ads ───────────────────────────────────────
      - name: Download and convert exclude_ads
        run: |
          mkdir -p rules
          curl -sL "https://raw.githubusercontent.com/efremych/mrs-rules/main/domain/exclude_ads.txt" | tr -d '\r' | grep -v '^$' > /tmp/ads_raw.txt
          TOTAL_ADS=$(wc -l < /tmp/ads_raw.txt)
          ADS_DOMAIN=$(grep -v '^+\.' /tmp/ads_raw.txt | wc -l)
          ADS_SUFFIX=$(grep '^+\.' /tmp/ads_raw.txt | wc -l)
          {
            echo "# NAME: exclude_ads"
            echo "# AUTHOR: efremych"
            echo "# REPO: https://github.com/efremych/ShadowRocket"
            echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S')"
            echo "# SOURCE: https://github.com/efremych/mrs-rules/blob/main/domain/exclude_ads.txt"
            echo "# DOMAIN: ${ADS_DOMAIN}"
            echo "# DOMAIN-SUFFIX: ${ADS_SUFFIX}"
            echo "# TOTAL: ${TOTAL_ADS}"
          } > rules/exclude_ads.list
          echo "" >> rules/exclude_ads.list
          sed -e 's/^+\./DOMAIN-SUFFIX,/' -e '/^DOMAIN-SUFFIX,/!s/^/DOMAIN,/' /tmp/ads_raw.txt >> rules/exclude_ads.list
          echo "✓ exclude_ads: ${TOTAL_ADS}"

      # ─── 2. ip-geo-detect ─────────────────────────────────────
