name: Convert exclude_ads to Shadowrocket

on:
  schedule:
    - cron: '0 4 * * 0'  # Каждое воскресенье в 4 утра
  workflow_dispatch:       # Ручной запуск по кнопке

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Права на запись в репозиторий
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and convert exclude_ads
        run: |
          # Создаём папку rules, если её нет
          mkdir -p rules
          
          # Скачиваем исходник, убираем Windows-символы (\r)
          # Убираем пустые строки и получаем список
          curl -sL "https://raw.githubusercontent.com/efremych/mrs-rules/main/domain/exclude_ads.txt" \
            | tr -d '\r' \
            | grep -v '^$' \
            > /tmp/ads_raw.txt
          
          # Считаем количество доменов для шапки
          TOTAL_DOMAINS=$(wc -l < /tmp/ads_raw.txt)
          
          # Формируем итоговый файл с шапкой
          {
            echo "# NAME: exclude_ads"
            echo "# AUTHOR: efremych"
            echo "# REPO: https://github.com/efremych/ShadowRocket"
            echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S')"
            echo "# SOURCE: https://github.com/efremych/mrs-rules/blob/main/domain/exclude_ads.txt"
            echo "# DOMAIN-SUFFIX: ${TOTAL_DOMAINS}"
            echo "# TOTAL: ${TOTAL_DOMAINS}"
          } > rules/exclude_ads.list
          
          # Конвертируем +.domain.com в DOMAIN-SUFFIX,domain.com
          # Добавляем пустую строку после шапки
          echo "" >> rules/exclude_ads.list
          
          sed 's/^+\./DOMAIN-SUFFIX,/' /tmp/ads_raw.txt >> rules/exclude_ads.list
          
          echo "✓ Сконвертировано доменов: ${TOTAL_DOMAINS}"

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rules/exclude_ads.list
          git diff --staged --quiet || git commit -m "Auto-update exclude_ads rules [skip ci]"
          git push
