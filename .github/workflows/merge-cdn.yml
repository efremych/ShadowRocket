name: Build merged CDN rules

on:
  schedule:
    - cron: '30 */6 * * *'   # каждые 6 часов в 30 минут (с запасом после обновления исходников)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all source lists and merge
        run: |
          mkdir -p rules

          # Список источников (прямые ссылки на raw)
          URLS=(
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/akamai.list"
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/amazon.list"
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/cdn77.list"
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/cloudflare.list"
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/digitalocean.list"
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/fastly.list"
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/hetzner.list"
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/oracle.list"
            "https://github.com/toneywhitez/zkeen_rules/releases/latest/download/scaleway_ips.list"
            "https://raw.githubusercontent.com/efremych/ShadowRocket/refs/heads/main/rules/vodafone.list"
          )

          # Временные файлы
          DOMAINS_FILE="/tmp/all_domains.tmp"
          IPS_FILE="/tmp/all_ips.tmp"
          > "$DOMAINS_FILE"
          > "$IPS_FILE"

          for url in "${URLS[@]}"; do
            echo "Скачиваем: $url"
            # Скачиваем, убираем \r и пустые строки, отсеиваем заголовки/комментарии
            curl -sL "$url" | tr -d '\r' | grep -v '^[[:space:]]*$' | grep -v '^#' > /tmp/current.list

            # Разделяем на домены и IP
            grep -E '^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD),' /tmp/current.list >> "$DOMAINS_FILE" || true
            grep -E '^(IP-CIDR|IP-CIDR6|IP-ASN),' /tmp/current.list >> "$IPS_FILE" || true
          done

          # Подсчёты
          DOMAIN_COUNT=$(wc -l < "$DOMAINS_FILE")
          IP_COUNT=$(wc -l < "$IPS_FILE")
          TOTAL=$((DOMAIN_COUNT + IP_COUNT))

          echo "Доменов: $DOMAIN_COUNT, IP: $IP_COUNT"

          # Сборка итогового файла
          {
            echo "# NAME: cdn_merged"
            echo "# AUTHOR: efremych (merged from multiple sources)"
            echo "# REPO: https://github.com/efremych/ShadowRocket"
            echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S')"
            echo "# SOURCE: akamai, amazon, cdn77, cloudflare, digitalocean, fastly, hetzner, oracle, scaleway, vodafone"
            echo "# DOMAIN: ${DOMAIN_COUNT}"
            echo "# IP-CIDR: ${IP_COUNT}"
            echo "# TOTAL: ${TOTAL}"
            echo ""
            echo "# ===== DOMAINS ====="
            cat "$DOMAINS_FILE"
            echo ""
            echo "# ===== IPs ====="
            cat "$IPS_FILE"
          } > rules/cdn_merged.list

          echo "✅ cdn_merged.list создан: $TOTAL правил"

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rules/cdn_merged.list
          git diff --staged --quiet || git commit -m "Auto-update merged CDN rules [skip ci]"
          git push
