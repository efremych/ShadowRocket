name: Build domains+IP rules

on:
  schedule:
    - cron: '0 1 * * 0' # В воскресенье в 4 утра по мск
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download and build combined rules
        run: |
          mkdir -p rules
          
          # Формат: имя|url_доменов|url_ip|автор
          SOURCES="
          akamai|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/akamai.list|https://github.com/toneywhitez/zkeen_rules/releases/latest/download/akamai_ips.list|MetaCubeX
          amazon|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/amazon.list|https://github.com/toneywhitez/zkeen_rules/releases/latest/download/amazon_ips.list|MetaCubeX
          cdn77|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cdn77.list|https://github.com/toneywhitez/zkeen_rules/releases/latest/download/cdn77_ips.list|MetaCubeX
          cloudflare|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cloudflare.list|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cloudflare.list|MetaCubeX
          custom|https://raw.githubusercontent.com/efremych/mrs-rules/main/domain/custom.txt|https://raw.githubusercontent.com/efremych/mrs-rules/main/ip_cidr/custom.txt|efremych
          digitalocean|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/digitalocean.list|https://github.com/toneywhitez/zkeen_rules/releases/latest/download/digitalocean_ips.list|MetaCubeX
          fastly|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/fastly.list|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/fastly.list|MetaCubeX
          hetzner|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/hetzner.list|https://github.com/toneywhitez/zkeen_rules/releases/latest/download/hetzner_ips.list|MetaCubeX
          meta|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/meta.list|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/facebook.list|MetaCubeX
          oracle|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/oracle.list|https://github.com/toneywhitez/zkeen_rules/releases/latest/download/oracle_ips.list|MetaCubeX
          telegram|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/telegram.list|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.list|MetaCubeX
          vodafone|https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/vodafone.list|https://github.com/toneywhitez/zkeen_rules/releases/latest/download/vodafone_ips.list|MetaCubeX
          "
          
          echo "$SOURCES" | while IFS='|' read -r name url_domains url_ip author; do
            [ -z "$name" ] && continue
            
            echo "::group::Обработка: ${name}"
            
            # Скачиваем домены
            curl -sL "$url_domains" | tr -d '\r' | grep -v '^$' > "/tmp/${name}_domains_raw.txt"
            TG_DOMAIN=$(grep -v '^+\.' "/tmp/${name}_domains_raw.txt" | wc -l)
            TG_SUFFIX=$(grep '^+\.' "/tmp/${name}_domains_raw.txt" | wc -l)
            TG_DOMAINS_TOTAL=$(wc -l < "/tmp/${name}_domains_raw.txt")
            
            # Скачиваем IP
            curl -sL "$url_ip" | tr -d '\r' | grep -v '^$' > "/tmp/${name}_ip_raw.txt"
            TG_IP=$(wc -l < "/tmp/${name}_ip_raw.txt")
            
            TOTAL=$((TG_DOMAINS_TOTAL + TG_IP))
            
            # Собираем файл
            {
              echo "# NAME: ${name}"
              echo "# AUTHOR: ${author} (converted by efremych)"
              echo "# REPO: https://github.com/efremych/ShadowRocket"
              echo "# UPDATED: $(TZ='Europe/Moscow' date '+%Y-%m-%d %H:%M:%S')"
              echo "# SOURCE: ${url_domains} + ${url_ip}"
              echo "# DOMAIN: ${TG_DOMAIN}"
              echo "# DOMAIN-SUFFIX: ${TG_SUFFIX}"
              echo "# IP-CIDR: ${TG_IP}"
              echo "# TOTAL: ${TOTAL}"
            } > "rules/${name}.list"
            
            echo "" >> "rules/${name}.list"
            
            # Домены
            sed -e 's/^+\./DOMAIN-SUFFIX,/' -e '/^DOMAIN-SUFFIX,/!s/^/DOMAIN,/' "/tmp/${name}_domains_raw.txt" >> "rules/${name}.list"
            
            # IP с no-resolve
            sed 's/^/IP-CIDR,/; s/$/,no-resolve/' "/tmp/${name}_ip_raw.txt" >> "rules/${name}.list"
            
            echo "✓ ${name}: доменов — ${TG_DOMAINS_TOTAL}, IP — ${TG_IP}, всего — ${TOTAL}"
            echo "::endgroup::"
          done

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rules/
          git diff --staged --quiet || git commit -m "Auto-update combined rules [skip ci]"
          git push
